name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.YOUTUBE_SUMMARY_HOST }}
          username: ${{ secrets.YOUTUBE_SUMMARY_USER }}
          key: ${{ secrets.YOUTUBE_SUMMARY_SSH_KEY }}
          script: |
            cd ~/youtube_summary
            git pull origin main
            docker compose up -d --build